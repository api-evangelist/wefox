aid: wefox
name: wefox
description: >-
  wefox is a Berlin-headquartered digital insurance distribution platform that
  connects insurance carriers, brokers, and end customers through a single
  technology stack. Founded in 2014 and originally known as FinanceFox, the
  company operates across Germany, Austria, Switzerland, Italy, the
  Netherlands, Spain, and France, selling personal-lines products such as
  motor, home, liability, life, and commercial insurance via its in-house
  carrier (wefox Insurance) and a network of independent brokers. wefox
  positions itself as an "indirect" insurtech — meaning it distributes
  through human advisors augmented by software rather than selling
  direct-to-consumer — and has historically been one of Europe's most
  highly funded insurtech companies, with backing from Mubadala, Target
  Global, Salesforce Ventures, OMERS Ventures, Eurazeo, Mountain Partners,
  and others. The platform itself is a multi-tenant SaaS used by brokers and
  agents to manage customer relationships, quote and bind policies across
  multiple carriers, handle claims, and trigger commissions. wefox does not
  publish a public developer portal, OpenAPI specifications, SDKs, or a
  github.com/wefox organization; integration with the wefox platform is
  carrier-, broker-, and partner-mediated rather than self-service, and
  there is no Tier-1 developer surface to document. This repo profiles
  wefox as an insurance distribution business and tracks any future move
  toward a public API program.
